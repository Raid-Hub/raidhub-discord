name: Deploy to Prod

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Dry run Discord command sync
        env:
          DISCORD_APPLICATION_ID: "0"
          DISCORD_SYNC_DRY_RUN: "true"
        run: sync-discord-commands

      - name: Install cloudflared
        run: ./.github/scripts/install-cloudflared.sh

      - name: Load SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}

      - name: Deploy Discord service
        env:
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_GHA_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_GHA_CLIENT_SECRET }}
        run: |
          ssh -o ProxyCommand="cloudflared access ssh --hostname %h" root@ssh.raidhub.io \
          "/RaidHub/deployment/deploy-discord.sh main discord-bot && /RaidHub/raidhub-discord/.venv/bin/sync-discord-commands"
